<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando… — Checkpoint Digital</title>
<link rel="stylesheet" href="shared.css">
<style>
  .article-hero {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 40px;
  }
  .article-hero-inner { max-width: 760px; margin: 0 auto; }

  .article-back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--text3);
    text-decoration: none; margin-bottom: 24px;
    transition: color 0.15s;
  }
  .article-back:hover { color: var(--text); }

  .article-platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
  }
  .badge-xbox  { background: var(--xbox-light);  color: var(--xbox-dark); }
  .badge-ps    { background: var(--ps-light);    color: var(--ps-dark); }
  .badge-nin   { background: var(--nin-light);   color: var(--nin-dark); }
  .badge-steam { background: var(--steam-light); color: var(--steam-dark); }

  .article-title {
    font-size: 32px; font-weight: 800; color: var(--text);
    line-height: 1.25; margin-bottom: 16px;
  }
  .article-meta {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    font-size: 13px; color: var(--text3);
  }
  .article-meta span { display: flex; align-items: center; gap: 5px; }
  .article-category-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
  }

  /* Conteúdo */
  .article-body-wrap {
    max-width: 760px; margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .article-body { font-size: 16px; color: var(--text2); line-height: 1.85; }
  .article-body p  { margin-bottom: 20px; }
  .article-body h3 { font-size: 20px; font-weight: 700; color: var(--text); margin: 32px 0 12px; }
  .article-body strong { color: var(--text); }
  .article-body em { color: var(--text3); font-size: 13px; }

  /* Loading */
  .art-loading {
    text-align: center; padding: 120px 24px; color: var(--text3);
  }
  .art-loading .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: #7c3aed;
    animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── REVIEW BOX ── */
  .review-box {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin: 40px 0;
    background: var(--bg2);
    transition: var(--theme-transition);
  }
  .rb-top { display: grid; grid-template-columns: 160px 1fr; }
  .rb-score {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 24px; background: var(--bg3);
    border-right: 1px solid var(--border);
  }
  .rb-score-num { font-size: 52px; font-weight: 800; line-height: 1; color: var(--text); }
  .rb-score-denom { font-size: 15px; color: var(--text3); margin-top: 2px; }
  .rb-score-bar {
    width: 64px; height: 6px; border-radius: 3px;
    background: var(--border); margin-top: 12px; overflow: hidden;
  }
  .rb-score-fill { height: 100%; border-radius: 3px; background: #22c55e; }
  .rb-score-label { font-size: 11px; color: #22c55e; margin-top: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .rb-cols { display: grid; grid-template-columns: 1fr 1fr; }
  .rb-col { padding: 20px 18px 16px; }
  .rb-col + .rb-col { border-left: 1px solid var(--border); }
  .rb-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; }
  .rb-col-title.pros { color: #22c55e; }
  .rb-col-title.cons { color: #ef4444; }
  .rb-item { font-size: 14px; color: var(--text2); margin-bottom: 7px; line-height: 1.5; }
  .rb-verdict {
    border-top: 1px solid var(--border);
    padding: 18px 22px;
    font-size: 14px; color: var(--text2); line-height: 1.7;
  }
  .rb-verdict strong { color: var(--text); }
  @media (max-width: 600px) {
    .rb-top { grid-template-columns: 1fr; }
    .rb-score { border-right: none; border-bottom: 1px solid var(--border); padding: 20px; flex-direction: row; gap: 16px; }
    .rb-cols { grid-template-columns: 1fr; }
    .rb-col + .rb-col { border-left: none; border-top: 1px solid var(--border); }
  }

  /* Outros artigos */
  .more-section {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 48px 24px;
  }
  .more-inner { max-width: 1100px; margin: 0 auto; }
  .more-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
  .more-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
</style>
</head>
<body>

<header class="site-header" id="site-header"></header>

<div id="article-content">
  <div class="art-loading"><div class="spinner"></div>Carregando artigo…</div>
</div>

<section class="more-section" id="more-section" style="display:none">
  <div class="more-inner">
    <div class="more-title">Mais notícias</div>
    <div class="more-grid" id="more-grid"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="shared.js"></script>
<script>
  renderHeader('');
  renderFooter();

  // Traduz o texto de loading inicial
  (function() {
    const isEN = getLang() === 'en';
    if (isEN) {
      const loadEl = document.querySelector('.art-loading');
      if (loadEl) loadEl.innerHTML = '<div class="spinner"></div>Loading article…';
    }
  })();

  const PLATFORM_LABELS = {
    xbox:  { emoji:'🟢', labelPT:'Xbox',          labelEN:'Xbox',          cls:'badge-xbox'  },
    ps:    { emoji:'🔵', labelPT:'PlayStation',   labelEN:'PlayStation',   cls:'badge-ps'    },
    nin:   { emoji:'🔴', labelPT:'Nintendo',      labelEN:'Nintendo',      cls:'badge-nin'   },
    steam: { emoji:'⚫', labelPT:'Steam / PC',    labelEN:'Steam / PC',    cls:'badge-steam' },
  };

  const PLATFORM_PAGES = {
    xbox:  'xbox.html',
    ps:    'playstation.html',
    nin:   'nintendo.html',
    steam: 'steam.html',
  };

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
  }

  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { showError(isEN ? 'Article not found.' : 'Artigo não encontrado.'); return; }

    const isEN = getLang() === 'en';

    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/articles?id=eq.${encodeURIComponent(id)}&select=*`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      const [art] = await res.json();
      if (!art) { showError(isEN ? 'Article not found.' : 'Artigo não encontrado.'); return; }

      const platRaw = PLATFORM_LABELS[art.platform] || { emoji:'📰', labelPT:'Notícias', labelEN:'News', cls:'badge-steam' };
      const platLabel = isEN ? platRaw.labelEN : platRaw.labelPT;
      const backPage = PLATFORM_PAGES[art.platform] || 'index.html';

      // Seleciona idioma
      const title  = (isEN && art.title_en)   ? art.title_en   : art.title;
      const body   = (isEN && art.body_en)     ? art.body_en    : art.body;
      const backLbl = isEN ? `← Back to ${platLabel}` : `← Voltar para ${platLabel}`;

      document.title = `${title} — Checkpoint Digital`;

      document.getElementById('article-content').innerHTML = `
        <div class="article-hero">
          <div class="article-hero-inner">
            <a class="article-back" href="${backPage}">${backLbl}</a>
            <div class="article-platform-badge ${platRaw.cls}">${platRaw.emoji} ${platLabel}</div>
            <h1 class="article-title">${title}</h1>
            <div class="article-meta">
              <span class="article-category-badge">${art.category}</span>
              <span>📅 ${formatDate(art.published_at)}</span>
              <span>⏱ ${art.read_time || '3 min'}</span>
              <span>✍️ ${art.author}</span>
            </div>
          </div>
        </div>
        <div class="article-body-wrap">
          <div class="article-body">${body}</div>
        </div>`;

      // Carrega mais artigos da mesma plataforma
      loadMore(art.platform, art.id);

    } catch(e) {
      showError(isEN ? 'Error loading article: ' + e.message : 'Erro ao carregar o artigo: ' + e.message);
    }
  }

  async function loadMore(platform, excludeId) {
    const isEN = getLang() === 'en';
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/articles?platform=eq.${platform}&id=neq.${encodeURIComponent(excludeId)}&select=id,title,excerpt,title_en,excerpt_en,category,published_at,read_time,image_url&order=published_at.desc&limit=3`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      const arts = await res.json();
      if (!arts.length) return;

      const platRaw2 = PLATFORM_LABELS[platform] || { emoji:'📰', labelPT:'', labelEN:'', cls:'badge-steam' };
      const platLabel2 = isEN ? platRaw2.labelEN : platRaw2.labelPT;
      const moreLabel = isEN ? 'More news' : 'Mais notícias';
      document.querySelector('.more-title').textContent = moreLabel;

      const grid = document.getElementById('more-grid');
      grid.innerHTML = arts.map(a => {
        const cardTitle   = (isEN && a.title_en)   ? a.title_en   : a.title;
        const cardExcerpt = (isEN && a.excerpt_en) ? a.excerpt_en : a.excerpt;
        const imgHtml = a.image_url
          ? `<img src="${a.image_url}" alt="${cardTitle}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-img-fallback ${platform}\\'>${platRaw2.emoji}</div>'">`
          : `<div class="card-img-fallback ${platform}">${platRaw2.emoji}</div>`;
        return `
          <a href="artigo.html?id=${encodeURIComponent(a.id)}" class="news-card" data-plat="${platform}" style="text-decoration:none">
            <div class="card-img-wrap">
              ${imgHtml}
              <div class="card-hover-overlay"><div class="card-hover-excerpt">${cardExcerpt}</div></div>
            </div>
            <div class="card-body">
              <div class="card-tags">
                <span class="tag tag-${platform}">${platRaw2.emoji} ${platLabel2}</span>
                <span class="badge badge-new">${a.category}</span>
              </div>
              <div class="card-title">${cardTitle}</div>
              <div class="card-meta">
                <span>${formatDate(a.published_at)}</span>
                <span class="sep"></span>
                <span>${a.read_time || '3 min'}</span>
              </div>
            </div>
          </a>`;
      }).join('');
      document.getElementById('more-section').style.display = '';
    } catch(e) {}
  }

  function showError(msg) {
    const isEN = getLang() === 'en';
    const backLabel = isEN ? '← Back to home' : '← Voltar ao início';
    document.getElementById('article-content').innerHTML = `
      <div style="text-align:center;padding:120px 24px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:16px">😕</div>
        <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">${msg}</div>
        <a href="index.html" style="color:#7c3aed;font-weight:600">${backLabel}</a>
      </div>`;
  }

  window.addEventListener('DOMContentLoaded', loadArticle);
</script>
</body>
</html>
