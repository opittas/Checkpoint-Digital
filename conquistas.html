<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conquistas — Checkpoint Digital</title>
<link rel="stylesheet" href="shared.css">
<style>
  .ach-hero {
    background: linear-gradient(135deg, #1e1b2e 0%, #2d1b4e 100%);
    padding: 36px 0 32px; border-bottom: 1px solid #3b1f6e;
  }
  .ach-hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .ach-hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: #ffffff18; color: #c4b5fd;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .ach-hero-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .ach-hero-meta  { font-size: 13px; color: #a78bfa; }

  .ach-filter-row {
    max-width: 1100px; margin: 0 auto;
    padding: 20px 24px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .ach-filter-btn {
    border: 1px solid var(--border); background: var(--bg);
    padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2);
    transition: all 0.15s;
  }
  .ach-filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .ach-filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* Game cards */
  .ach-game-card {
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg); cursor: pointer; text-decoration: none; display: block;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; overflow: hidden;
  }
  .ach-game-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.12); border-color: #7c3aed55; }
  .ach-game-cover { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--bg3); }
  .ach-game-cover-skeleton {
    width: 100%; height: 160px;
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; display: none;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .ach-game-body { padding: 14px 16px 16px; }
  .ach-game-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ach-game-dev   { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .ach-game-plats { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .ach-plat-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .xbox-badge  { background: var(--xbox-light);  color: var(--xbox-dark); }
  .ps-badge    { background: var(--ps-light);    color: var(--ps-dark); }
  .nin-badge   { background: var(--nin-light);   color: var(--nin-dark); }
  .steam-badge { background: var(--steam-light); color: var(--steam-dark); }
  .ach-game-meta  { display: flex; align-items: center; gap: 8px; }
  .ach-diff-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .diff-hard { background: #fee2e2; color: #7f1d1d; }
  .diff-med  { background: #fef3c7; color: #78350f; }
  .diff-low  { background: #d1fae5; color: #064e3b; }

  /* Badge "sem página" */
  .no-page-badge {
    font-size: 10px; color: var(--text3); font-style: italic;
    padding: 2px 6px; border-radius: 4px; background: var(--bg3);
  }

  .games-loading { text-align: center; padding: 80px 24px; color: var(--text3); font-size: 14px; }
  .games-loading .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: #7c3aed;
    animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="site-header" id="site-header"></header>

<div class="ach-hero">
  <div class="ach-hero-inner">
    <div class="ach-hero-eyebrow">🏆 Guias de Conquistas</div>
    <h1 class="ach-hero-title">Escolha um jogo para ver o guia completo</h1>
    <div class="ach-hero-meta">Conquistas Xbox · Troféus PlayStation · Steam Achievements</div>
  </div>
</div>

<!-- Filtro de plataforma -->
<div class="ach-filter-row">
  <button class="ach-filter-btn active" id="gl-filter-all"   onclick="filterGameList('all')">Todos</button>
  <button class="ach-filter-btn" id="gl-filter-xbox"  onclick="filterGameList('xbox')">🟢 Xbox</button>
  <button class="ach-filter-btn" id="gl-filter-ps"    onclick="filterGameList('ps')">🔵 PlayStation</button>
  <button class="ach-filter-btn" id="gl-filter-nin"   onclick="filterGameList('nin')">🔴 Nintendo</button>
  <button class="ach-filter-btn" id="gl-filter-steam" onclick="filterGameList('steam')">⚫ Steam</button>
</div>

<!-- Grid de jogos (populado via Supabase) -->
<div style="max-width:1100px;margin:0 auto;padding:28px 24px 64px">
  <div id="ach-games-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
    <div class="games-loading" style="grid-column:1/-1"><div class="spinner"></div>Carregando jogos…</div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="shared.js"></script>
<script>
  renderHeader('ach');
  renderFooter();

  // ════════════════════════════════════════════════════════
  // MAPA DE PÁGINAS: game_id → arquivo HTML na pasta /conquistas/
  // Ao criar a página de um novo jogo, adicione aqui.
  // ════════════════════════════════════════════════════════
  const GAME_PAGES = {
    'eldenring':   'conquistas/elden-ring.html',
    // 'gow':        'conquistas/god-of-war.html',
    // 'halo':       'conquistas/halo-infinite.html',
    // 'tlou':       'conquistas/tlou.html',
    // 'cyberpunk':  'conquistas/cyberpunk.html',
    // 'rdr2':       'conquistas/rdr2.html',
  };

  let allGames = [];
  let activeFilter = 'all';

  async function fetchGames() {
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/games?select=*&order=title.asc`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      if (!res.ok) throw new Error('Supabase error ' + res.status);
      allGames = await res.json();
      renderGameGrid(allGames);
    } catch (e) {
      document.getElementById('ach-games-grid').innerHTML =
        `<div class="games-loading" style="grid-column:1/-1;color:#dc2626">
          <div style="font-size:32px;margin-bottom:12px">⚠️</div>
          Não foi possível carregar os jogos.
        </div>`;
    }
  }

  function diffClass(d) {
    return d === 'Alta' ? 'diff-hard' : d === 'Fácil' ? 'diff-low' : 'diff-med';
  }

  function buildPlatBadges(g) {
    let h = '';
    if (g.xbox_label)  h += `<span class="ach-plat-badge xbox-badge">🟢 ${g.xbox_label}</span>`;
    if (g.ps_label)    h += `<span class="ach-plat-badge ps-badge">🔵 ${g.ps_label}</span>`;
    if (g.nin_label)   h += `<span class="ach-plat-badge nin-badge">🔴 ${g.nin_label}</span>`;
    if (g.steam_label) h += `<span class="ach-plat-badge steam-badge">⚫ ${g.steam_label}</span>`;
    return h;
  }

  function renderGameGrid(games) {
    const grid = document.getElementById('ach-games-grid');
    if (!games.length) {
      grid.innerHTML = `<div class="games-loading" style="grid-column:1/-1">Nenhum jogo encontrado.</div>`;
      return;
    }
    grid.innerHTML = games.map(g => {
      const page = GAME_PAGES[g.id];
      const hasPage = !!page;
      // Se o jogo tem página, vira link; senão é um card desabilitado
      const tag  = hasPage ? 'a' : 'div';
      const href = hasPage ? `href="${page}"` : '';
      const cursor = hasPage ? '' : 'style="cursor:default;opacity:0.6"';
      const comingSoon = !hasPage
        ? `<span class="no-page-badge">Guia em breve</span>`
        : `<span style="font-size:11px;color:#7c3aed;font-weight:700">Ver guia →</span>`;

      return `
        <${tag} class="ach-game-card" ${href} ${cursor}>
          <img class="ach-game-cover" src="${g.image_url||''}" alt="${g.title}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
          <div class="ach-game-cover-skeleton"></div>
          <div class="ach-game-body">
            <div class="ach-game-title">${g.title}</div>
            <div class="ach-game-dev">${g.developer} · ${g.release_year}</div>
            <div class="ach-game-plats">${buildPlatBadges(g)}</div>
            <div class="ach-game-meta">
              <span class="ach-diff-badge ${diffClass(g.difficulty)}">${g.difficulty}</span>
              <span style="color:var(--text3);font-size:12px">${g.hours_estimate}${g.missable_count > 0 ? ' · ' + g.missable_count + ' missáveis' : ''}</span>
              <span style="margin-left:auto">${comingSoon}</span>
            </div>
          </div>
        </${tag}>`;
    }).join('');
  }

  function filterGameList(plat) {
    activeFilter = plat;
    document.querySelectorAll('[id^="gl-filter-"]').forEach(b => b.classList.remove('active'));
    document.getElementById('gl-filter-' + plat).classList.add('active');
    renderGameGrid(plat === 'all' ? allGames : allGames.filter(g => (g.platforms||[]).includes(plat)));
  }

  window.addEventListener('DOMContentLoaded', fetchGames);
</script>
</body>
</html>
