<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOM: The Dark Ages — Conquistas · Checkpoint Digital</title>
<link rel="stylesheet" href="../shared.css">
<style>
  /* ── HERO ── */
  .ach-hero {
    background: linear-gradient(135deg, #1a0a00 0%, #3d1200 60%, #1a0a00 100%);
    padding: 36px 0 32px;
    border-bottom: 1px solid #7c2d12;
  }
  .ach-hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .ach-hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: #ffffff18; color: #fca5a5;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .ach-hero-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .ach-hero-meta  { font-size: 13px; color: #fca5a5; display: flex; gap: 12px; flex-wrap: wrap; }
  .ach-hero-meta span { display: flex; align-items: center; gap: 5px; }

  /* ── TABS ── */
  .ach-plat-tabs {
    max-width: 1100px; margin: 0 auto;
    padding: 20px 24px 0;
    display: flex; gap: 8px; border-bottom: 1px solid var(--border);
  }
  .ach-tab {
    padding: 10px 22px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--border); border-bottom: none;
    background: var(--bg3); color: var(--text2);
    transition: all 0.15s; margin-bottom: -1px;
  }
  .ach-tab:hover { background: var(--bg); color: var(--text); }
  .ach-tab.active-xbox  { background: var(--bg); color: var(--xbox);       border-bottom: 1px solid var(--bg); }
  .ach-tab.active-ps    { background: var(--bg); color: var(--ps);         border-bottom: 1px solid var(--bg); }
  .ach-tab.active-steam { background: var(--bg); color: var(--steam-dark); border-bottom: 1px solid var(--bg); }

  /* ── PAINÉIS ── */
  .ach-platform-panel { display: none; }
  .ach-platform-panel.active { display: block; }

  /* ── REVIEW BOX ── */
  .review-box-section {
    max-width: 1100px; margin: 0 auto;
    padding: 28px 24px 0;
  }
  .review-box-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
    color: var(--text3); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .review-box-title::before {
    content: ''; display: inline-block; width: 3px; height: 16px;
    border-radius: 2px; background: #ef4444;
  }
  .rb {
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; background: var(--bg2);
    transition: var(--theme-transition);
  }
  .rb-top { display: grid; grid-template-columns: 160px 1fr; }
  .rb-score {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 24px; background: var(--bg3); border-right: 1px solid var(--border);
  }
  .rb-score-num { font-size: 52px; font-weight: 800; line-height: 1; color: var(--text); }
  .rb-score-denom { font-size: 15px; color: var(--text3); margin-top: 2px; }
  .rb-score-bar { width: 64px; height: 6px; border-radius: 3px; background: var(--border); margin-top: 12px; overflow: hidden; }
  .rb-score-fill { height: 100%; border-radius: 3px; background: #22c55e; }
  .rb-score-label { font-size: 11px; color: #22c55e; margin-top: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .rb-cols { display: grid; grid-template-columns: 1fr 1fr; }
  .rb-col { padding: 20px 18px 16px; }
  .rb-col + .rb-col { border-left: 1px solid var(--border); }
  .rb-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; }
  .rb-col-title.pros { color: #22c55e; }
  .rb-col-title.cons { color: #ef4444; }
  .rb-item { font-size: 14px; color: var(--text2); margin-bottom: 7px; line-height: 1.5; display: flex; align-items: flex-start; gap: 7px; }
  .rb-item-pro::before { content: '✓'; color: #22c55e; font-weight: 700; flex-shrink: 0; }
  .rb-item-con::before { content: '✗'; color: #ef4444; font-weight: 700; flex-shrink: 0; }
  .rb-verdict {
    border-top: 1px solid var(--border); padding: 18px 22px;
    font-size: 14px; color: var(--text2); line-height: 1.7;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .rb-verdict-body { flex: 1; }
  .rb-verdict-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); margin-bottom: 5px; }
  .rb-verdict-text { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .rb-review-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px; font-size: 13px; font-weight: 700; color: #ef4444;
    text-decoration: none; padding: 7px 14px; border-radius: 6px;
    border: 1px solid #ef444460; transition: all 0.15s;
  }
  .rb-review-link:hover { background: #ef444415; border-color: #ef4444; }
  @media (max-width: 600px) {
    .rb-top { grid-template-columns: 1fr; }
    .rb-score { border-right: none; border-bottom: 1px solid var(--border); padding: 20px; flex-direction: row; gap: 16px; }
    .rb-cols { grid-template-columns: 1fr; }
    .rb-col + .rb-col { border-left: none; border-top: 1px solid var(--border); }
  }

  /* ── SUMMARY ── */
  .ach-summary {
    max-width: 1100px; margin: 0 auto; padding: 20px 24px;
    display: flex; gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .ach-stat {
    background: var(--bg3); border-radius: var(--radius-lg);
    padding: 12px 20px; flex: 1; min-width: 120px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .ach-stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .ach-stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .ach-stat-value.xbox-color { color: var(--xbox); }
  .ach-stat-value.ps-color   { color: var(--ps); }

  /* ── FILTROS ── */
  .ach-filter-row {
    max-width: 1100px; margin: 0 auto; padding: 14px 24px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .ach-filter-label { font-size: 12px; font-weight: 600; color: var(--text3); margin-right: 4px; }
  .ach-filter-btn {
    border: 1px solid var(--border); background: var(--bg);
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2);
    transition: all 0.15s;
  }
  .ach-filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .ach-filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── LISTA ── */
  .ach-list {
    max-width: 1100px; margin: 0 auto;
    padding: 20px 24px 48px;
    display: flex; flex-direction: column;
  }
  .ach-item {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 16px; align-items: start;
    padding: 18px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .ach-item:hover { background: var(--bg2); margin: 0 -24px; padding: 18px 24px; }
  .ach-item:last-child { border-bottom: none; }

  /* ── ÍCONE ── */
  .ach-icon {
    width: 56px; height: 56px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: 2px solid var(--border); overflow: hidden;
  }
  .ach-icon.gold     { background: #fef9c3; border-color: #fde047; }
  .ach-icon.silver   { background: #f1f5f9; border-color: #cbd5e1; }
  .ach-icon.bronze   { background: #fef3e2; border-color: #fdba74; }
  .ach-icon.platinum { background: linear-gradient(135deg,#e0e7ff,#ede9fe); border-color: #a5b4fc; }
  .ach-icon-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 4px; }
  .ach-icon-svg { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
  .ach-icon-svg svg { width: 28px; height: 28px; }
  .ach-icon-img + .ach-icon-svg { display: none; }

  /* ── INFO ── */
  .ach-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .ach-desc { font-size: 13px; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
  .ach-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .ach-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; }
  .tag-missable   { background: #fee2e2; color: #7f1d1d; }
  .tag-unmissable { background: #d1fae5; color: #064e3b; }
  .tag-secret     { background: #f3e8ff; color: #4c1d95; }
  .tag-story      { background: #e0f2fe; color: #0c4a6e; }

  /* ── PONTOS / TROFÉU ── */
  .ach-pts { text-align: right; flex-shrink: 0; }
  .ach-pts-value { font-size: 17px; font-weight: 700; }
  .ach-pts-value.xbox-pts { color: var(--xbox); }
  .ach-pts-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .trophy-platina { background: linear-gradient(135deg,#c7d2fe,#ddd6fe); color: #3730a3; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-ouro    { background: #fef9c3; color: #78350f; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-prata   { background: #f1f5f9; color: #334155; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-bronze  { background: #fef3e2; color: #92400e; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }

  /* ── GUIA DRAWER ── */
  .ach-guide-drawer {
    display: none; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin: 0 0 2px; padding: 20px 24px;
  }
  .ach-guide-drawer.open { display: block; }
  .ach-guide-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .ach-guide-title::before { content: ''; display: inline-block; width: 3px; height: 16px; border-radius: 2px; background: #ef4444; }
  .ach-guide-body { font-size: 13px; color: var(--text2); line-height: 1.75; }
  .ach-guide-step { display: flex; gap: 10px; margin-bottom: 10px; }
  .ach-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: #ef4444; color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .ach-step-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .ach-tip     { background: #fef9c3; border-left: 3px solid #fbbf24; border-radius: 0 6px 6px 0; padding: 10px 14px; margin-top: 10px; font-size: 12px; color: #78350f; line-height: 1.6; }
  .ach-warning { background: #fee2e2; border-left: 3px solid #f87171; border-radius: 0 6px 6px 0; padding: 10px 14px; margin-top: 10px; font-size: 12px; color: #7f1d1d; line-height: 1.6; }

  /* ── LOADING ── */
  .games-loading { text-align: center; padding: 80px 24px; color: var(--text3); font-size: 14px; }
  .games-loading .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: #ef4444;
    animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BACK BUTTON ── */
  .back-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 24px; }
  .back-bar-inner { max-width: 1100px; margin: 0 auto; }
  .back-btn {
    background: none; border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; color: var(--text2);
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  .back-btn:hover { border-color: var(--text3); color: var(--text); }
</style>
</head>

  // Mapa de categorias PT→EN para os filtros e tags
  const CAT_EN = {
    'História':'Story','Chefes':'Bosses','Upgrades':'Upgrades','Coletáveis':'Collectibles','Grind':'Grind'
  };

  function buildPanel(achievements, platform, isEN) {
    const sourceList = platform === 'steam'
      ? achievements.filter(a => a.platform === 'xbox' && a.rarity !== 'platinum').map(a => ({...a, platform:'steam'}))
      : achievements.filter(a => a.platform === platform && a.rarity !== 'platinum');

    const totalPts = platform === 'xbox'
      ? achievements.filter(a => a.platform === 'xbox').reduce((s,a) => s + parseInt(a.points||0), 0) + 'G'
      : platform === 'ps' ? (isEN ? 'Platinum' : 'Platina') : '🖥️ PC';
    const ptsLabel = platform === 'xbox'
      ? (isEN ? 'Total Points' : 'Total de Pontos')
      : platform === 'ps' ? (isEN ? 'Max Trophy' : 'Troféu Máximo') : (isEN ? 'Platform' : 'Plataforma');
    const ptsColor = platform === 'xbox' ? 'xbox-color' : platform === 'ps' ? 'ps-color' : '';
    const missable = sourceList.filter(a => a.missable).length;

    const filtersPT = ['Todas','História','Chefes','Upgrades','Coletáveis','Grind'];
    const filtersEN = ['All','Story','Bosses','Upgrades','Collectibles','Grind'];
    const filters   = isEN ? filtersEN : filtersPT;

    const achLabel      = isEN ? 'Achievements' : 'Conquistas';
    const missableLabel = isEN ? 'Missable' : 'Missáveis';
    const filterLabel   = isEN ? 'Filter:' : 'Filtrar:';
    const noneLabel     = isEN ? '✓ None' : '✓ Nenhuma';

    let html = `
      <div class="ach-summary">
        <div class="ach-stat">
          <div class="ach-stat-label">${ptsLabel}</div>
          <div class="ach-stat-value ${ptsColor}">${totalPts}</div>
        </div>
        <div class="ach-stat">
          <div class="ach-stat-label">${achLabel}</div>
          <div class="ach-stat-value">${sourceList.length}</div>
        </div>
        <div class="ach-stat">
          <div class="ach-stat-label">${missableLabel}</div>
          <div class="ach-stat-value" style="color:#16a34a">${missable === 0 ? noneLabel : missable}</div>
        </div>
      </div>
      <div class="ach-filter-row">
        <span class="ach-filter-label">${filterLabel}</span>
        ${filters.map((l,i) => `<button class="ach-filter-btn${i===0?' active':''}" data-filter-en="${filtersEN[i]}" data-filter-pt="${filtersPT[i]}" onclick="filterAch(this,'${platform}')">${l}</button>`).join('')}
      </div>
      <div class="ach-list">`;

    sourceList.sort((a,b) => a.sort_order - b.sort_order).forEach(a => {
      const uid = `${platform}-${a.id}`;
      const catLabel = isEN ? (CAT_EN[a.category] || a.category) : a.category;
      const desc = isEN && a.description_en ? a.description_en : a.description;

      const tags = [
        `<span class="ach-tag tag-story">${catLabel}</span>`,
        a.secret ? `<span class="ach-tag tag-secret">${isEN ? 'Secret' : 'Secreto'}</span>` : '',
        `<span class="ach-tag tag-unmissable">${isEN ? 'Unmissable' : 'Unmissable'}</span>`,
      ].filter(Boolean).join('');

      const trophyLabel = a.trophy_type === 'Platina' ? (isEN ? 'Platinum' : 'Platina')
        : a.trophy_type === 'Ouro'   ? (isEN ? 'Gold'   : 'Ouro')
        : a.trophy_type === 'Prata'  ? (isEN ? 'Silver' : 'Prata')
        : (isEN ? 'Bronze' : 'Bronze');
      const trophyCls = a.trophy_type === 'Platina' ? 'platinum'
        : a.trophy_type === 'Ouro' ? 'ouro'
        : a.trophy_type === 'Prata' ? 'prata' : 'bronze';

      const pts = platform === 'xbox'
        ? `<div class="ach-pts-value xbox-pts">${a.points||'?'}</div><div class="ach-pts-label">Gamerscore</div>`
        : platform === 'steam'
          ? `<div style="font-size:20px;text-align:center">🏆</div>`
          : `<div class="trophy-${trophyCls}">${trophyLabel}</div>`;

      const svgFallback = `<span class="ach-icon-svg" style="color:${RARITY_COLOR[a.rarity]||'#b45309'}">${ICON_SVG[a.category]||ICON_SVG['História']}</span>`;
      const icon = a.icon_url
        ? `<img src="${a.icon_url}" alt="${a.name}" class="ach-icon-img" onerror="this.replaceWith(this.nextElementSibling)">${svgFallback}`
        : svgFallback;

      const guideTitle = isEN ? `How to unlock: ${a.name}` : `Como desbloquear: ${a.name}`;

      html += `
        <div class="ach-item" data-achcat="${a.category}" onclick="toggleGuide('${uid}')">
          <div class="ach-icon ${a.rarity}">${icon}</div>
          <div class="ach-info">
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${desc}</div>
            <div class="ach-tags">${tags}</div>
          </div>
          <div class="ach-pts">${pts}</div>
        </div>
        <div class="ach-guide-drawer" id="guide-${uid}">
          <div class="ach-guide-title">${guideTitle}</div>
          <div class="ach-guide-body">
            <p>${isEN ? 'Click to see the detailed guide for this achievement.' : 'Clique para ver o guia detalhado desta conquista.'}</p>
          </div>
        </div>`;
    });

    html += '</div>';
    return html;
  }

  function switchPlatform(plat) {
    ['xbox','ps','steam'].forEach(p => {
      document.getElementById('panel-' + p).classList.toggle('active', p === plat);
      const tab = document.getElementById('ach-tab-' + p);
      tab.className = 'ach-tab';
      if (p === plat) tab.classList.add('active-' + p);
    });
  }

  function toggleGuide(id) {
    const drawer = document.getElementById('guide-' + id);
    if (!drawer) return;
    const isOpen = drawer.classList.contains('open');
    drawer.closest('.ach-platform-panel').querySelectorAll('.ach-guide-drawer').forEach(d => d.classList.remove('open'));
    if (!isOpen) drawer.classList.add('open');
  }

  function filterAch(btn, plat) {
    const panel = document.getElementById('panel-' + plat);
    panel.querySelectorAll('.ach-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Usa sempre o valor PT para comparar com data-achcat (que é sempre PT)
    const catPT = btn.dataset.filterPt || btn.textContent.trim();
    const isAll = catPT === 'Todas' || catPT === 'All';
    panel.querySelectorAll('.ach-item').forEach(item => {
      const show = isAll ? true : item.dataset.achcat === catPT;
      item.style.display = show ? '' : 'none';
      const next = item.nextElementSibling;
      if (next?.classList.contains('ach-guide-drawer')) {
        next.style.display = show ? '' : 'none';
        if (!show) next.classList.remove('open');
      }
    });
  }

    const isEN = getLang() === 'en';
    const game = GAME_DATA;

    // ── Título e meta do jogo ──

      `<span>📅 ${game.release_year}</span>` +
      `<span>⚡ ${isEN ? 'Difficulty' : 'Dificuldade'}: ${isEN ? 'Medium' : game.difficulty}</span>` +
      `<span>⏱ ${game.hours_estimate}</span>` +
      `<span style="color:#4ade80">✓ ${isEN ? 'No missable achievements' : 'Nenhuma conquista missável'}</span>`;

    // ── Hero eyebrow ──
    document.getElementById('hero-eyebrow').textContent = isEN ? '🏆 Achievement Guide' : '🏆 Guia de Conquistas';

    // ── Back button ──

    // ── Review Box ──
    document.getElementById('rb-section-title').textContent = isEN ? 'Our score' : 'Nossa nota';
    document.getElementById('rb-score-label').textContent   = isEN ? 'Great' : 'Ótimo';
    document.getElementById('pros-title').innerHTML  = isEN ? '✔ Pros'  : '✔ Prós';
    document.getElementById('cons-title').innerHTML  = isEN ? '✘ Cons'  : '✘ Contras';
    document.getElementById('verdict-label').textContent = isEN ? 'Final verdict' : 'Veredicto final';

    document.getElementById('pro-1').textContent = isEN
      ? 'Combat that rewards aggression and mastery'
      : 'Combate que recompensa agressividade e maestria';
    document.getElementById('pro-2').textContent = isEN
