<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — Conquistas · Checkpoint Digital</title>
<link rel="stylesheet" href="../shared.css">
<style>
  /* ════════════════════════════════
     CONFIGURAÇÃO DO JOGO
     Edite apenas esta seção para
     adaptar a outro jogo.
  ════════════════════════════════ */
  :root {
    --game-id:    "eldenring"; /* ID na tabela games do Supabase */
  }

  /* ── HERO ── */
  .ach-hero {
    background: linear-gradient(135deg, #1e1b2e 0%, #2d1b4e 100%);
    padding: 36px 0 32px;
    border-bottom: 1px solid #3b1f6e;
  }
  .ach-hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .ach-hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: #ffffff18; color: #c4b5fd;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .ach-hero-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .ach-hero-meta  { font-size: 13px; color: #a78bfa; display: flex; gap: 12px; flex-wrap: wrap; }
  .ach-hero-meta span { display: flex; align-items: center; gap: 5px; }

  /* ── TABS DE PLATAFORMA ── */
  .ach-plat-tabs {
    max-width: 1100px; margin: 0 auto;
    padding: 20px 24px 0;
    display: flex; gap: 8px; border-bottom: 1px solid var(--border);
  }
  .ach-tab {
    padding: 10px 22px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--border); border-bottom: none;
    background: var(--bg3); color: var(--text2);
    transition: all 0.15s; margin-bottom: -1px;
  }
  .ach-tab:hover { background: var(--bg); color: var(--text); }
  .ach-tab.active-xbox  { background: var(--bg); color: var(--xbox);       border-bottom: 1px solid var(--bg); }
  .ach-tab.active-ps    { background: var(--bg); color: var(--ps);         border-bottom: 1px solid var(--bg); }
  .ach-tab.active-steam { background: var(--bg); color: var(--steam-dark); border-bottom: 1px solid var(--bg); }

  /* ── PAINÉIS ── */
  .ach-platform-panel { display: none; }
  .ach-platform-panel.active { display: block; }

  /* ── SUMMARY ── */
  .ach-summary {
    max-width: 1100px; margin: 0 auto; padding: 20px 24px;
    display: flex; gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .ach-stat {
    background: var(--bg3); border-radius: var(--radius-lg);
    padding: 12px 20px; flex: 1; min-width: 120px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .ach-stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .ach-stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .ach-stat-value.xbox-color { color: var(--xbox); }
  .ach-stat-value.ps-color   { color: var(--ps); }

  /* ── FILTROS ── */
  .ach-filter-row {
    max-width: 1100px; margin: 0 auto; padding: 14px 24px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .ach-filter-label { font-size: 12px; font-weight: 600; color: var(--text3); margin-right: 4px; }
  .ach-filter-btn {
    border: 1px solid var(--border); background: var(--bg);
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2);
    transition: all 0.15s;
  }
  .ach-filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .ach-filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── LISTA ── */
  .ach-list {
    max-width: 1100px; margin: 0 auto;
    padding: 20px 24px 48px;
    display: flex; flex-direction: column;
  }
  .ach-item {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 16px; align-items: start;
    padding: 18px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .ach-item:hover { background: var(--bg2); margin: 0 -24px; padding: 18px 24px; }
  .ach-item:last-child { border-bottom: none; }

  /* ── ÍCONE ── */
  .ach-icon {
    width: 56px; height: 56px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: 2px solid var(--border); overflow: hidden;
  }
  .ach-icon.gold     { background: #fef9c3; border-color: #fde047; box-shadow: 0 0 0 1px #fde04740; }
  .ach-icon.silver   { background: #f1f5f9; border-color: #cbd5e1; box-shadow: 0 0 0 1px #cbd5e140; }
  .ach-icon.bronze   { background: #fef3e2; border-color: #fdba74; box-shadow: 0 0 0 1px #fdba7440; }
  .ach-icon.platinum { background: linear-gradient(135deg,#e0e7ff,#ede9fe); border-color: #a5b4fc; box-shadow: 0 0 8px #a5b4fc60; }
  .ach-icon-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 4px; }
  .ach-icon-svg { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
  .ach-icon-svg svg { width: 28px; height: 28px; }
  .ach-icon-img + .ach-icon-svg { display: none; }

  /* ── INFO ── */
  .ach-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .ach-desc { font-size: 13px; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
  .ach-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .ach-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; }
  .tag-missable   { background: #fee2e2; color: #7f1d1d; }
  .tag-unmissable { background: #d1fae5; color: #064e3b; }
  .tag-secret     { background: #f3e8ff; color: #4c1d95; }
  .tag-story      { background: #e0f2fe; color: #0c4a6e; }

  /* ── PONTOS / TROFÉU ── */
  .ach-pts { text-align: right; flex-shrink: 0; }
  .ach-pts-value { font-size: 17px; font-weight: 700; }
  .ach-pts-value.xbox-pts { color: var(--xbox); }
  .ach-pts-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .trophy-plat   { background: linear-gradient(135deg,#c7d2fe,#ddd6fe); color: #3730a3; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-gold   { background: #fef9c3; color: #78350f; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-silver { background: #f1f5f9; color: #334155; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .trophy-bronze { background: #fef3e2; color: #92400e; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }

  /* ── GUIA DRAWER ── */
  .ach-guide-drawer {
    display: none; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin: 0 0 2px; padding: 20px 24px;
  }
  .ach-guide-drawer.open { display: block; }
  .ach-guide-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .ach-guide-title::before { content: ''; display: inline-block; width: 3px; height: 16px; border-radius: 2px; background: #7c3aed; }
  .ach-guide-body { font-size: 13px; color: var(--text2); line-height: 1.75; }
  .ach-guide-step { display: flex; gap: 10px; margin-bottom: 10px; }
  .ach-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: #7c3aed; color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .ach-step-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .ach-tip {
    background: #fef9c3; border-left: 3px solid #fbbf24;
    border-radius: 0 6px 6px 0; padding: 10px 14px; margin-top: 10px;
    font-size: 12px; color: #78350f; line-height: 1.6;
  }
  .ach-warning {
    background: #fee2e2; border-left: 3px solid #f87171;
    border-radius: 0 6px 6px 0; padding: 10px 14px; margin-top: 10px;
    font-size: 12px; color: #7f1d1d; line-height: 1.6;
  }

  /* ── LOADING ── */
  .games-loading { text-align: center; padding: 80px 24px; color: var(--text3); font-size: 14px; }
  .games-loading .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: #7c3aed;
    animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BACK BUTTON ── */
  .back-bar {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 10px 24px;
  }
  .back-bar-inner { max-width: 1100px; margin: 0 auto; }
  .back-btn {
    background: none; border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; color: var(--text2);
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  .back-btn:hover { border-color: var(--text3); color: var(--text); }
</style>
</head>

  // ── Carrega dados (hardcoded + Supabase como enriquecimento) ──
  async function loadGame() {
    // Usa dados hardcoded imediatamente
    const game = GAME_DATA;

    // Preenche hero
    document.getElementById('game-title').textContent = game.title;
    document.title = `${game.title} — Conquistas · Checkpoint Digital`;
    let meta = `<span>🎮 ${game.developer}</span><span>📅 ${game.release_year}</span>`;
    if (game.difficulty)     meta += `<span>⚡ Dificuldade: ${game.difficulty}</span>`;
    if (game.hours_estimate) meta += `<span>⏱ ${game.hours_estimate}</span>`;
    if (game.missable_count) meta += `<span>⚠️ ${game.missable_count} missáveis</span>`;
    document.getElementById('game-meta').innerHTML = meta;

    // Tabs
    document.getElementById('ach-tab-xbox').style.display  = game.xbox_label  ? '' : 'none';
    document.getElementById('ach-tab-ps').style.display    = game.ps_label    ? '' : 'none';
    document.getElementById('ach-tab-steam').style.display = game.steam_label ? '' : 'none';
    if (game.xbox_label)  document.getElementById('label-xbox').textContent  = `Xbox — ${game.xbox_label}`;
    if (game.ps_label)    document.getElementById('label-ps').textContent    = `PlayStation — ${game.ps_label}`;
    if (game.steam_label) document.getElementById('label-steam').textContent = `Steam — ${game.steam_label}`;

    // Tenta enriquecer com guide_steps/guide_tips do Supabase
    let achievements = ACHIEVEMENTS;
    try {
      const aRes = await fetch(
        `${SUPA_URL}/rest/v1/achievements?game_id=eq.${GAME_ID}&select=id,guide_intro,guide_steps,guide_tips&order=sort_order.asc`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      if (aRes.ok) {
        const supaData = await aRes.json();
        const supaMap = {};
        supaData.forEach(a => { supaMap[a.id] = a; });
        // Mescla guias do Supabase nos dados hardcoded
        achievements = ACHIEVEMENTS.map(a => {
          const s = supaMap[a.id];
          return s ? { ...a, guide_intro: s.guide_intro, guide_steps: s.guide_steps, guide_tips: s.guide_tips } : a;
        });
      }
    } catch(e) { /* Offline: usa só dados hardcoded */ }

    // Renderiza painéis
    if (game.xbox_label)  document.getElementById('panel-xbox').innerHTML  = buildPanel(achievements, 'xbox');
    if (game.ps_label)    document.getElementById('panel-ps').innerHTML    = buildPanel(achievements, 'ps');
    if (game.steam_label) document.getElementById('panel-steam').innerHTML = buildPanel(achievements, 'steam');

    switchPlatform('xbox');
  }

  // ── Renderiza painel de conquistas ──
  function buildPanel(achievements, platform) {
    // Steam usa base do Xbox (mesma lista, sem pontos/troféu)
    const sourceList = platform === 'steam'
      ? achievements.filter(a => a.platform === 'xbox' && a.rarity !== 'platinum').map(a => ({...a, platform:'steam'}))
      : achievements.filter(a => a.platform === platform && a.rarity !== 'platinum');

    const totalPts = platform === 'xbox'
      ? achievements.filter(a => a.platform === 'xbox').reduce((s,a) => s + parseInt(a.points||0), 0) + 'G'
      : platform === 'ps' ? 'Platina' : '🖥️ PC';
    const ptsLabel = platform === 'xbox' ? 'Total de Pontos' : platform === 'ps' ? 'Troféu Máximo' : 'Plataforma';
    const ptsColor = platform === 'xbox' ? 'xbox-color' : platform === 'ps' ? 'ps-color' : '';
    const missable = sourceList.filter(a => a.missable).length;

    const filters = ['Todas','Missáveis','História','Chefes','Exploração','Grind','NPC / Quest'];

    let html = `
      <div class="ach-summary">
        <div class="ach-stat">
          <div class="ach-stat-label">${ptsLabel}</div>
          <div class="ach-stat-value ${ptsColor}">${totalPts}</div>
        </div>
        <div class="ach-stat">
          <div class="ach-stat-label">Conquistas</div>
          <div class="ach-stat-value">${sourceList.length}</div>
        </div>
        <div class="ach-stat">
          <div class="ach-stat-label">Missáveis</div>
          <div class="ach-stat-value" style="color:#dc2626">${missable}</div>
        </div>
      </div>
      <div class="ach-filter-row">
        <span class="ach-filter-label">Filtrar:</span>
        ${filters.map((l,i) => `<button class="ach-filter-btn${i===0?' active':''}" onclick="filterAch(this,'${platform}')">${l}</button>`).join('')}
      </div>
      <div class="ach-list">`;

    sourceList.sort((a,b) => a.sort_order - b.sort_order).forEach(a => {
      const id = `${platform}-${a.id}`;

      const tags = [
        a.category !== 'Missável' ? `<span class="ach-tag tag-story">${a.category}</span>` : '',
        a.missable ? `<span class="ach-tag tag-missable">Missável</span>` : '',
        a.secret   ? `<span class="ach-tag tag-secret">Secreto</span>` : '',
        !a.missable && !a.secret ? `<span class="ach-tag tag-unmissable">Unmissable</span>` : '',
      ].filter(Boolean).join('');

      const pts = platform === 'xbox'
        ? `<div class="ach-pts-value xbox-pts">${a.points||'?'}</div><div class="ach-pts-label">Gamerscore</div>`
        : platform === 'steam'
          ? `<div style="font-size:20px;text-align:center">🏆</div>`
          : `<div class="trophy-${(a.trophy_type||'bronze').toLowerCase()}">${a.trophy_type||'Bronze'}</div>`;

      const svgFallback = `<span class="ach-icon-svg" style="color:${RARITY_COLOR[a.rarity]||'#b45309'}">${ICON_SVG[a.category]||ICON_SVG['História']}</span>`;
      const icon = a.icon_url
        ? `<img src="${a.icon_url}" alt="${a.name}" class="ach-icon-img" onerror="this.replaceWith(this.nextElementSibling)">${svgFallback}`
        : svgFallback;

      const steps = (a.guide_steps||[]).map(s =>
        `<div class="ach-guide-step"><div class="ach-step-num">${s.step}</div><div class="ach-step-text">${s.text}</div></div>`
      ).join('');
      const tips = (a.guide_tips||[]).map(t =>
        `<div class="${t.type==='warning'?'ach-warning':'ach-tip'}"><strong>${t.type==='warning'?'Atenção:':'Dica:'}</strong> ${t.text.replace(/^(Dica:|Atenção:)\s*/,'')}</div>`
      ).join('');

      html += `
        <div class="ach-item" data-achcat="${a.category}" onclick="toggleGuide('${id}')">
          <div class="ach-icon ${a.rarity}">${icon}</div>
          <div class="ach-info">
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${a.description}</div>
            <div class="ach-tags">${tags}</div>
          </div>
          <div class="ach-pts">${pts}</div>
        </div>
        <div class="ach-guide-drawer" id="guide-${id}">
          <div class="ach-guide-title">Como desbloquear: ${a.name}</div>
          <div class="ach-guide-body">
            ${a.guide_intro ? `<p>${a.guide_intro}</p>` : ''}
            ${steps}${tips}
          </div>
        </div>`;
    });

    html += '</div>';
    return html;
  }

  // ── Switch de plataforma ──
  function switchPlatform(plat) {
    ['xbox','ps','steam'].forEach(p => {
      document.getElementById('panel-' + p).classList.toggle('active', p === plat);
      const tab = document.getElementById('ach-tab-' + p);
      tab.className = 'ach-tab';
      if (p === plat) tab.classList.add('active-' + p);
    });
  }

  // ── Toggle do guia ──
  function toggleGuide(id) {
    const drawer = document.getElementById('guide-' + id);
    if (!drawer) return;
    const isOpen = drawer.classList.contains('open');
    drawer.closest('.ach-platform-panel').querySelectorAll('.ach-guide-drawer').forEach(d => d.classList.remove('open'));
    if (!isOpen) drawer.classList.add('open');
  }

  // ── Filtro por categoria ──
  function filterAch(btn, plat) {
    const panel = document.getElementById('panel-' + plat);
    panel.querySelectorAll('.ach-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.textContent.trim();
    panel.querySelectorAll('.ach-item').forEach(item => {
      const show = cat === 'Todas' ? true
        : cat === 'Missáveis' ? item.querySelector('.tag-missable') !== null
        : item.dataset.achcat === cat;
      item.style.display = show ? '' : 'none';
      const next = item.nextElementSibling;
      if (next?.classList.contains('ach-guide-drawer')) {
        next.style.display = show ? '' : 'none';
        if (!show) next.classList.remove('open');
      }
    });
  }

  // Inicia ao carregar
  window.addEventListener('DOMContentLoaded', loadGame);
</script>
