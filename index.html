<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkpoint Digital — Blog de Games</title>
<link rel="stylesheet" href="shared.css">
<style>
  /* ── HOME HERO ── */
  .hero {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 48px 0 40px;
    transition: var(--theme-transition);
  }
  .hero-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 24px;
    display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px;
  }
  .hero-tag.xbox  { background: var(--xbox-light);  color: var(--xbox-dark); }
  .hero-tag.ps    { background: var(--ps-light);    color: var(--ps-dark); }
  .hero-tag.nin   { background: var(--nin-light);   color: var(--nin-dark); }
  .hero-tag.steam { background: var(--steam-light); color: var(--steam-dark); }
  .hero-title { font-size: 28px; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 12px; }
  .hero-meta { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ── SIDE NEWS ── */
  .side-news { display: flex; flex-direction: column; gap: 0; }
  .side-news-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 12px; }
  .side-item { padding: 12px 0; border-bottom: 1px solid var(--border); transition: opacity 0.15s; text-decoration: none; display: block; }
  .side-item:last-child { border-bottom: none; }
  .side-item:hover { opacity: 0.7; }
  .side-item-plat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .side-item-plat.xbox  { color: var(--xbox); }
  .side-item-plat.ps    { color: var(--ps); }
  .side-item-plat.nin   { color: var(--nin); }
  .side-item-plat.steam { color: var(--steam); }
  .side-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
  .side-item-date  { font-size: 11px; color: var(--text3); }

  /* ── HOME PLATFORM SECTIONS ── */
  .home-sections { padding: 40px 0; }
  .home-plat-section { margin-bottom: 40px; }
  .home-plat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
  .home-plat-name { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .plat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .plat-dot.xbox  { background: var(--xbox); }
  .plat-dot.ps    { background: var(--ps); }
  .plat-dot.nin   { background: var(--nin); }
  .plat-dot.steam { background: var(--steam); }
  .see-all-btn {
    font-size: 12px; font-weight: 600;
    background: none; border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    text-decoration: none;
  }
  .see-all-btn:hover { border-color: var(--text3); color: var(--text); }
  .see-all-btn.xbox  { color: var(--xbox);  border-color: var(--xbox); }
  .see-all-btn.ps    { color: var(--ps);    border-color: var(--ps); }
  .see-all-btn.nin   { color: var(--nin);   border-color: var(--nin); }
  .see-all-btn.steam { color: var(--steam); border-color: var(--steam); }

  /* Skeleton / loading */
  .home-skeleton { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

  /* Hero loading */
  .hero-loading { color: var(--text3); font-size: 14px; padding: 20px 0; }

  @media (max-width: 768px) {
    .hero-inner { grid-template-columns: 1fr; }
    .side-news  { display: none; }
  }
</style>
</head>
<body>

<header class="site-header" id="site-header"></header>

<!-- ── HERO (preenchido via Supabase) ── -->
<div class="hero">
  <div class="hero-inner">
    <div id="hero-main">
      <div class="hero-loading">Carregando destaque…</div>
    </div>
    <aside class="side-news">
      <div class="side-news-title">Últimas notícias</div>
      <div id="side-news-list" style="color:var(--text3);font-size:13px">Carregando…</div>
    </aside>
  </div>
</div>

<!-- ── SEÇÕES POR PLATAFORMA ── -->
<div class="home-sections">
  <div class="wrapper">

    <div class="home-plat-section">
      <div class="home-plat-header">
        <div class="home-plat-name"><span class="plat-dot xbox"></span> Xbox</div>
        <a class="see-all-btn xbox" href="xbox.html">Ver tudo →</a>
      </div>
      <div class="cards-grid" id="home-xbox">
        <div class="home-skeleton">Carregando…</div>
      </div>
    </div>

    <div class="home-plat-section">
      <div class="home-plat-header">
        <div class="home-plat-name"><span class="plat-dot ps"></span> PlayStation</div>
        <a class="see-all-btn ps" href="playstation.html">Ver tudo →</a>
      </div>
      <div class="cards-grid" id="home-ps">
        <div class="home-skeleton">Carregando…</div>
      </div>
    </div>

    <div class="home-plat-section">
      <div class="home-plat-header">
        <div class="home-plat-name"><span class="plat-dot nin"></span> Nintendo</div>
        <a class="see-all-btn nin" href="nintendo.html">Ver tudo →</a>
      </div>
      <div class="cards-grid" id="home-nin">
        <div class="home-skeleton">Carregando…</div>
      </div>
    </div>

    <div class="home-plat-section">
      <div class="home-plat-header">
        <div class="home-plat-name"><span class="plat-dot steam"></span> Steam / PC</div>
        <a class="see-all-btn steam" href="steam.html">Ver tudo →</a>
      </div>
      <div class="cards-grid" id="home-steam">
        <div class="home-skeleton">Carregando…</div>
      </div>
    </div>

  </div>
</div>

<footer id="site-footer"></footer>
<script src="shared.js"></script>
<script>
  renderHeader('home');
  renderFooter();

  const isEN = getLang() === 'en';

  const PLAT_META = {
    xbox:  { emoji: '🟢', label: 'Xbox',        tagCls: 'tag-xbox',  stripeCls: 'xbox',  heroTagCls: 'xbox',  page: 'xbox.html'        },
    ps:    { emoji: '🔵', label: 'PlayStation', tagCls: 'tag-ps',    stripeCls: 'ps',    heroTagCls: 'ps',    page: 'playstation.html' },
    nin:   { emoji: '🔴', label: 'Nintendo',    tagCls: 'tag-nin',   stripeCls: 'nin',   heroTagCls: 'nin',   page: 'nintendo.html'    },
    steam: { emoji: '⚫', label: 'Steam / PC',  tagCls: 'tag-steam', stripeCls: 'steam', heroTagCls: 'steam', page: 'steam.html'       },
  };

  const CAT_BADGE = {
    'Notícias':    'badge-new',  'News':      'badge-new',
    'Lançamentos': 'badge-new',  'Releases':  'badge-new',
    'Previstos':   'badge-preview','Upcoming': 'badge-preview',
    'Reviews':     'badge-review',
    'Retrô':       'badge-retro', 'Retro':    'badge-retro',
    'Guias':       'badge-preview','Guides':   'badge-preview',
  };

  function fmtDate(iso) {
    const locale = isEN ? 'en-US' : 'pt-BR';
    return new Date(iso).toLocaleDateString(locale, { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function buildCard(a) {
    const pm = PLAT_META[a.platform] || PLAT_META.steam;
    const badge = CAT_BADGE[a.category] || 'badge-new';
    const title   = t(a, 'title');
    const excerpt = t(a, 'excerpt');
    const imgHtml = a.image_url
      ? `<img src="${a.image_url}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-img-fallback ${a.platform}\\'>${pm.emoji}</div>'">`
      : `<div class="card-img-fallback ${a.platform}">${pm.emoji}</div>`;
    return `
      <a href="artigo.html?id=${encodeURIComponent(a.id)}" class="news-card" data-plat="${a.platform}" style="text-decoration:none">
        <div class="card-img-wrap">
          ${imgHtml}
          <div class="card-hover-overlay">
            <div class="card-hover-excerpt">${excerpt}</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-tags">
            <span class="tag ${pm.tagCls}">${pm.emoji} ${pm.label}</span>
            <span class="badge ${badge}">${a.category}</span>
          </div>
          <div class="card-title">${title}</div>
          <div class="card-meta">
            <span>${fmtDate(a.published_at)}</span>
            <span class="sep"></span>
            <span>${a.read_time || '3 min'}</span>
          </div>
        </div>
      </a>`;
  }

  function buildHero(a) {
    const pm = PLAT_META[a.platform] || PLAT_META.steam;
    const title   = t(a, 'title');
    const excerpt = t(a, 'excerpt');
    const readLabel = isEN ? 'read' : 'de leitura';
    const spotlight = isEN ? 'Spotlight' : 'Destaque';
    const btnLabel  = isEN ? 'Read full article →' : 'Ler artigo completo →';
    return `
      <div class="hero-tag ${pm.heroTagCls}">${pm.emoji} ${pm.label} · ${spotlight}</div>
      <h1 class="hero-title">${title}</h1>
      <div class="hero-meta">
        <span>${fmtDate(a.published_at)}</span>
        <span style="width:3px;height:3px;border-radius:50%;background:var(--text3);display:inline-block"></span>
        <span>${a.read_time || '3 min'} ${readLabel}</span>
        <span class="badge ${CAT_BADGE[a.category] || 'badge-new'}">${a.category}</span>
      </div>
      <p style="margin-top:16px;font-size:14px;color:var(--text2);line-height:1.7;max-width:560px">${excerpt}</p>
      <a href="artigo.html?id=${encodeURIComponent(a.id)}"
         style="display:inline-block;margin-top:18px;background:#7c3aed;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none">
        ${btnLabel}
      </a>`;
  }

  function buildSideItem(a) {
    const pm = PLAT_META[a.platform] || PLAT_META.steam;
    const title = t(a, 'title');
    return `
      <a href="artigo.html?id=${encodeURIComponent(a.id)}" class="side-item">
        <div class="side-item-plat ${a.platform}">${pm.emoji} ${pm.label}</div>
        <div class="side-item-title">${title}</div>
        <div class="side-item-date">${fmtDate(a.published_at)}</div>
      </a>`;
  }

  async function loadHome() {
    try {
      // Busca os 20 artigos mais recentes de todas as plataformas (com campos EN)
      const res = await fetch(
        `${SUPA_URL}/rest/v1/articles?select=id,platform,category,gen,title,excerpt,title_en,excerpt_en,published_at,read_time,featured,image_url&order=published_at.desc&limit=20`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      const arts = await res.json();

      if (!arts.length) {
        document.getElementById('hero-main').innerHTML = `<p style="color:var(--text3)">${isEN ? 'No articles published yet.' : 'Nenhum artigo publicado ainda.'}</p>`;
        return;
      }

      // ── Hero: artigo mais recente (featured se existir, senão o primeiro) ──
      const featured = arts.find(a => a.featured) || arts[0];
      document.getElementById('hero-main').innerHTML = buildHero(featured);

      // ── Side news: 5 mais recentes excluindo o hero ──
      const sideList = arts.filter(a => a.id !== featured.id).slice(0, 5);
      document.getElementById('side-news-list').innerHTML = sideList.map(buildSideItem).join('')
        || `<span style="color:var(--text3)">${isEN ? 'No other news yet.' : 'Sem outras notícias ainda.'}</span>`;

      // ── Cards por plataforma: 3 mais recentes de cada ──
      const platIds = ['xbox', 'ps', 'nin', 'steam'];
      for (const plat of platIds) {
        const platArts = arts.filter(a => a.platform === plat).slice(0, 3);
        const el = document.getElementById('home-' + plat);
        if (!platArts.length) {
          el.innerHTML = `<div class="home-skeleton" style="font-style:italic">${isEN ? 'No news on this platform yet.' : 'Nenhuma notícia ainda nesta plataforma.'}</div>`;
        } else {
          el.innerHTML = platArts.map(buildCard).join('');
        }
      }

    } catch(e) {
      document.getElementById('hero-main').innerHTML =
        `<p style="color:#dc2626">⚠️ ${isEN ? 'Error loading news: ' : 'Erro ao carregar notícias: '}${e.message}</p>`;
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    // Traduz textos estáticos da UI antes de carregar
    if (isEN) {
      document.querySelector('.side-news-title').textContent = 'Latest news';
      document.getElementById('hero-main').innerHTML = '<div class="hero-loading">Loading…</div>';
      document.getElementById('side-news-list').textContent = 'Loading…';
      // "Ver tudo" buttons
      document.querySelectorAll('.see-all-btn').forEach(b => {
        b.textContent = 'See all →';
      });
      // Platform names in section headers
      document.querySelectorAll('.home-skeleton').forEach(b => {
        b.textContent = 'Loading…';
      });
    }
    loadHome();
  });
</script>
</body>
</html>
