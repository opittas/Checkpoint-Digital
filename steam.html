<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam / PC — Checkpoint Digital</title>
<link rel="stylesheet" href="shared.css">
<style>
  .cards-loading { text-align:center; padding:60px 24px; color:var(--text3); grid-column:1/-1; }
  .cards-loading .spinner {
    width:32px; height:32px; border-radius:50%;
    border:3px solid var(--border); border-top-color:#1b2838;
    animation:spin 0.7s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header class="site-header" id="site-header"></header>

<div class="plat-header">
  <div class="plat-header-inner">
    <div class="plat-name steam">Steam / PC</div>
    <div class="gen-filter" id="steam-gens">
      <button class="gen-btn active-steam" data-gen="all"     data-plat="steam" onclick="filterGen(this,'steam')">Tudo</button>
      <button class="gen-btn"              data-gen="deck"    data-plat="steam" onclick="filterGen(this,'steam')">Steam Deck</button>
      <button class="gen-btn"              data-gen="windows" data-plat="steam" onclick="filterGen(this,'steam')">Windows</button>
      <button class="gen-btn"              data-gen="macos"   data-plat="steam" onclick="filterGen(this,'steam')">macOS</button>
      <button class="gen-btn"              data-gen="linux"   data-plat="steam" onclick="filterGen(this,'steam')">Linux</button>
    </div>
  </div>
</div>

<div class="cat-filter">
  <button class="cat-btn active" onclick="filterCat(this)">Tudo</button>
  <button class="cat-btn" onclick="filterCat(this)">Lançamentos</button>
  <button class="cat-btn" onclick="filterCat(this)">Previstos</button>
  <button class="cat-btn" onclick="filterCat(this)">Reviews</button>
  <button class="cat-btn" onclick="filterCat(this)">Notícias</button>
  <button class="cat-btn" onclick="filterCat(this)">Guias</button>
</div>

<div class="cards-section">
  <div class="wrapper">
    <div class="cards-grid" id="steam-cards">
      <div class="cards-loading"><div class="spinner"></div>Carregando notícias…</div>
    </div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="shared.js"></script>
<script>
  renderHeader('steam');
  renderFooter();

  const GEN_LABELS = {
    'deck':'Steam Deck','windows':'Windows','macos':'macOS','linux':'Linux'
  };
  const CAT_BADGE = {
    'Notícias':'badge-new','Lançamentos':'badge-new',
    'Previstos':'badge-preview','Reviews':'badge-review',
    'Retrô':'badge-retro','Guias':'badge-preview'
  };

  let allCards = [];

  async function loadArticles() {
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/articles?platform=eq.steam&select=id,title,excerpt,title_en,excerpt_en,category,gen,published_at,read_time,image_url&order=published_at.desc`,
        { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
      );
      const arts = await res.json();
      allCards = arts;
      renderCards(arts);
    } catch(e) {
      document.getElementById('steam-cards').innerHTML =
        `<div class="cards-loading" style="color:#dc2626">⚠️ Erro ao carregar notícias.</div>`;
    }
  }

  const isEN = getLang() === 'en';

  function renderCards(arts) {
    const grid = document.getElementById('steam-cards');
    if (!arts.length) {
      grid.innerHTML = `<div class="cards-loading">${isEN ? 'No news found.' : 'Nenhuma notícia encontrada.'}</div>`;
      return;
    }
    const locale = isEN ? 'en-US' : 'pt-BR';
    grid.innerHTML = arts.map(a => {
      const genLabel = GEN_LABELS[a.gen] || 'PC';
      const catBadge = CAT_BADGE[a.category] || 'badge-new';
      const date = new Date(a.published_at).toLocaleDateString(locale,{day:'2-digit',month:'short',year:'numeric'});
      const cardTitle   = (isEN && a.title_en)   ? a.title_en   : a.title;
      const cardExcerpt = (isEN && a.excerpt_en) ? a.excerpt_en : a.excerpt;
      const imgHtml = a.image_url
        ? `<img src="${a.image_url}" alt="${cardTitle}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-img-fallback steam\\'>⚫</div>'">`
        : `<div class="card-img-fallback steam">⚫</div>`;
      return `
        <a href="artigo.html?id=${encodeURIComponent(a.id)}" class="news-card" data-plat="steam" data-gen="${a.gen||'all'}" data-cat="${a.category}" style="text-decoration:none">
          <div class="card-img-wrap">
            ${imgHtml}
            <div class="card-hover-overlay"><div class="card-hover-excerpt">${cardExcerpt}</div></div>
          </div>
          <div class="card-body">
            <div class="card-tags">
              <span class="tag tag-steam">${genLabel}</span>
              <span class="badge ${catBadge}">${a.category}</span>
            </div>
            <div class="card-title">${cardTitle}</div>
            <div class="card-meta"><span>${date}</span><span class="sep"></span><span>${a.read_time||'3 min'}</span></div>
          </div>
        </a>`;
    }).join('');
  }

  window.filterGen = function(btn, plat) {
    document.querySelectorAll('#steam-gens .gen-btn').forEach(b => { b.className = 'gen-btn'; });
    btn.classList.add('active-steam');
    const gen = btn.dataset.gen;
    renderCards(gen === 'all' ? allCards : allCards.filter(a => a.gen === gen));
  };

  window.addEventListener('DOMContentLoaded', () => {
    if (isEN) {
      document.querySelector('#steam-gens [data-gen="all"]').textContent = 'All platforms';
      document.querySelectorAll('.cat-btn').forEach(b => {
        const map = {'Tudo':'All','Lançamentos':'Releases','Previstos':'Upcoming','Reviews':'Reviews','Notícias':'News','Retrô':'Retro'};
        if (map[b.textContent]) b.textContent = map[b.textContent];
      });
    }
    loadArticles();
  });
</script>
</body>
</html>
